# 模型配置文件

models:
  openai_gpt4:
    provider: "openai"
    model_name: "gpt-4"
    api_key_env: "OPENAI_API_KEY"
    max_tokens: 4000
    temperature: 0.7
  
  openai_gpt4_turbo:
    provider: "openai"
    model_name: "gpt-4-turbo-preview"
    api_key_env: "OPENAI_API_KEY"
    max_tokens: 4000
    temperature: 0.7
  
  openai_gpt35:
    provider: "openai"
    model_name: "gpt-3.5-turbo"
    api_key_env: "OPENAI_API_KEY"
    max_tokens: 4000
    temperature: 0.7
  
  anthropic_claude3_opus:
    provider: "anthropic"
    model_name: "claude-3-opus-20240229"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 4000
    temperature: 0.7
  
  anthropic_claude3_sonnet:
    provider: "anthropic"
    model_name: "claude-3-sonnet-20240229"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 4000
    temperature: 0.7
  
  local_llama2:
    provider: "local"
    model_path: "models/llama-2-7b"
    max_tokens: 2000
    temperature: 0.7

# Agent-模型映射
agent_models:
  plot_agent: "openai_gpt4"
  character_agent: "openai_gpt4"
  worldbuilding_agent: "openai_gpt4"
  writing_agent: "anthropic_claude3_opus"
  editing_agent: "openai_gpt4"
  reviewer_agent: "anthropic_claude3_opus"
